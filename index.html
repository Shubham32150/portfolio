<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card UI Design</title>

    <link rel="stylesheet" href="style.css" />
    <!-- Boxicons CSS -->
    <link href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css" rel="stylesheet" />
  </head>
  <body>
    <div class="profile-card">
      <div class="image">
        <img src="bipin.png" alt="Bipin" class="profile-img" />
      </div>


      <div class="text-data">
        <span class="name">Bipin Sigdel</span>
        <span class="job">Student</span>
      </div>

      <div class="media-buttons">
        <a href="https://www.facebook.com/bipin.sigdel.902" style="background: #4267b2" class="link">
          <i class="bx bxl-facebook"></i>
        </a>
        <a href="https://x.com/BipinSigdel16" style="background: #1da1f2" class="link">
          <i class="bx bxl-twitter"></i>
        </a>
        <a href="https://www.instagram.com/bipin_sigdel_/" style="background: #e1306c" class="link">
          <i class="bx bxl-instagram"></i>
        </a>
        <a href="#" style="background: #ff0000" class="link">
          <i class="bx bxl-youtube"></i>
        </a>
      </div>

      <div class="buttons">

        <button class="button">Subscribe</button>
        <a href="https://m.me/bipin.sigdel.902" class="button" target="_blank">Message</a>

      </div>

      <div class="analytics">
        <div class="data">

          <span class="number">151 followers</span>
        </div>

        <div class="data">

          <span class="number">151 following</span>
        </div>
      </div>
    </div>
  </body>
</html>
