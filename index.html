<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card UI Design</title>

    <link rel="stylesheet" href="style.css" />
    <!-- Boxicons CSS -->
    <link href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css" rel="stylesheet" />
  </head>
  <body>
    <div class="profile-card">
      <div class="image">
        <img src="https://scontent.fktm21-1.fna.fbcdn.net/v/t39.30808-1/462658120_1071590607923217_7019988148940379766_n.jpg?stp=dst-jpg_s200x200&_nc_cat=110&ccb=1-7&_nc_sid=0ecb9b&_nc_ohc=6dtwL1X4Z2gQ7kNvgG6QrwA&_nc_zt=24&_nc_ht=scontent.fktm21-1.fna&_nc_gid=AGJaRTCrXN03m6dGY85sHK_&oh=00_AYAxA0lai7yVG-5rDnb-yEA5fXuYbHor4nIuFEf9dr_VGA&oe=67377026" alt="" class="profile-img" />
      </div>

      <div class="text-data">
        <span class="name">Shubham Pradhananga</span>
        <span class="job">Student</span>
      </div>

      <div class="media-buttons">
        <a href="https://www.facebook.com/profile.php?id=100052168624124" style="background: #4267b2" class="link">
          <i class="bx bxl-facebook"></i>
        </a>
        <a href="#" style="background: #1da1f2" class="link">
          <i class="bx bxl-twitter"></i>
        </a>
        <a href="https://www.instagram.com/shubham_pradhananga/" style="background: #e1306c" class="link">
          <i class="bx bxl-instagram"></i>
        </a>
        <a href="#" style="background: #ff0000" class="link">
          <i class="bx bxl-youtube"></i>
        </a>
      </div>

      <div class="buttons">
        <button class="button">Subscribe</button>
        <button class="button">Message</button>
      </div>

      <div class="analytics">
        <div class="data">
          <i class="bx bx-heart"></i>
          <span class="number">60k</span>
        </div>
        <div class="data">
          <i class="bx bx-message-rounded"></i>
          <span class="number">20k</span>
        </div>
        <div class="data">
          <i class="bx bx-share"></i>
          <span class="number">12k</span>
        </div>
      </div>
    </div>
  </body>
</html>
