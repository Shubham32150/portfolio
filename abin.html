<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card UI Design</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Boxicons CSS -->
    <link href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="photos/sanskar.png">
  </head>
  <body>
    <div class="profile-card">
      <!-- Search Section -->
      <div class="search-bar">
        <input type="text" id="search-input" class="search-input" placeholder="Search for a profile..." />
        <button onclick="searchProfile()" class="search-button">Go</button>
      </div>

      <!-- Profile Card Content -->
      <div class="image">
        <img src="photos/abin.png" alt="Abin" class="profile-img" />
      </div>

      <div class="text-data">
        <span class="name">Abin Karki</span>
        <span class="job">Student</span>
      </div>

      <div class="media-buttons">
        <a href="https://www.facebook.com/profile.php?id=61555026276565" style="background: #4267b2" class="link">
          <i class="bx bxl-facebook"></i>
        </a>
        <a href="#" style="background: #1da1f2" class="link">
          <i class="bx bxl-twitter"></i>
        </a>
        <a href="https://www.instagram.com/_abin_karki_/" style="background: #e1306c" class="link">
          <i class="bx bxl-instagram"></i>
        </a>
        <a href="#" style="background: #ff0000" class="link">
          <i class="bx bxl-youtube"></i>
        </a>
      </div>

      <div class="buttons">
        <a href="#" class="button" target="_blank">Follow</a>
        <a href="https://m.me/61555026276565" class="button" target="_blank">Message</a>
      </div>

      <div class="analytics">
        <div class="data">
          <span class="number">168 followers</span>
        </div>
        <div class="data">
          <span class="number">137 following</span>
        </div>
      </div>
    </div>

    <script>
      function searchProfile() {
        const searchQuery = document.getElementById("search-input").value.trim().toLowerCase();

        if (searchQuery) {
          // Construct the URL dynamically based on the input
          const profileUrl = searchQuery + ".html";
          
          // Check if the profile exists (basic check if the file exists, you can enhance this)
          // If the file exists, it will redirect to that profile
          window.location.href = profileUrl;
        } else {
          alert("Please enter a name to search!");
        }
      }
    </script>
  </body>
</html>
